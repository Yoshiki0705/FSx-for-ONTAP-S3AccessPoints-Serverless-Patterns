AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  UC30 Amazon Quick Agentic Workspace over FSx for ONTAP
  FSx ONTAP S3 Access Point を Amazon Quick Suite のデータ基盤として活用する。
  - Quick Index / Quick Research: 非構造化ファイル（index/）
  - Quick Sight (BI): 構造化 CSV を Glue/Athena 経由で分析（analytics/）
  - Quick Flows: アクション API（API Gateway + Lambda + Bedrock）（flows/）
  注意: Amazon Quick 本体のデータソース接続は Quick コンソールで構成する。

Parameters:
  S3AccessPointAlias:
    Type: String
    Description: S3 Access Point エイリアス（xxx-ext-s3alias 形式）

  S3AccessPointName:
    Type: String
    Description: S3 Access Point 名（IAM ARN 用）

  WorkspacePrefix:
    Type: String
    Default: quick-workspace/
    Description: Quick ワークスペース領域のプレフィックス

  BedrockLlmModelId:
    Type: String
    Default: apac.amazon.nova-pro-v1:0
    Description: Quick Flows アクションの要約生成用 Bedrock モデル/推論プロファイル ID

  BedrockGuardrailId:
    Type: String
    Default: ''
    Description: 任意の Bedrock Guardrail ID（GENSEC02。空なら未適用）

  BedrockGuardrailVersion:
    Type: String
    Default: DRAFT
    Description: Bedrock Guardrail バージョン

  QuickDataSourcePrincipal:
    Type: String
    Default: ''
    Description: >
      Amazon Quick のデータソースアクセスに使用する IAM プリンシパル ARN（任意）。
      空の場合は当該アカウントの root を信頼（後で Quick 接続用に限定すること）。

  PrepScheduleExpression:
    Type: String
    Default: rate(1 hour)
    Description: データ準備マニフェスト更新スケジュール

  NotificationEmail:
    Type: String
    Default: ''
    Description: 通知先メールアドレス

  MonthlyBudgetUsd:
    Type: String
    Default: '50'
    Description: 月次コスト予算（USD）。NotificationEmail 指定時に予算アラートを作成

  AllowRawSql:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Athena Query Lambda で任意 SQL（event.sql）を許可するか。既定 false（許可リスト
      NAMED_QUERIES のみ実行）。管理用途で任意 SQL が必要な場合のみ true にする。

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]
  HasQuickPrincipal: !Not [!Equals [!Ref QuickDataSourcePrincipal, '']]

Resources:
  # --- Athena 結果バケット ---
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-query-results
            Status: Enabled
            ExpirationInDays: 30

  # --- 結果バケットの TLS-only ポリシー ---
  AthenaResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AthenaResultsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AthenaResultsBucket.Arn
              - !Sub '${AthenaResultsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # --- Glue Database（構造化データのカタログ） ---
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: quick_workspace_db
        Description: Amazon Quick Sight 用 FSx ONTAP S3 AP 構造化データ

  # --- Athena WorkGroup ---
  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: quick-workspace-wg
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AthenaResultsBucket}/athena-results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  # --- SNS Topic ---
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      KmsMasterKeyId: alias/aws/sns

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref NotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # --- アラーム通知用 CMK + 専用トピック（CloudWatch→SNS の確実な配信） ---
  AlarmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: UC30 alarm notifications CMK (CloudWatch -> SNS)
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Root
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchAndSNS
            Effect: Allow
            Principal:
              Service:
                - cloudwatch.amazonaws.com
                - sns.amazonaws.com
            Action:
              - kms:GenerateDataKey*
              - kms:Decrypt
            Resource: '*'

  AlarmsTopic:
    Type: AWS::SNS::Topic
    Properties:
      KmsMasterKeyId: !Ref AlarmsKey

  # --- AWS Budgets 月次予算アラート（FinOps、メール指定時のみ） ---
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Condition: HasNotificationEmail
    Properties:
      Budget:
        BudgetName: !Sub '${AWS::StackName}-monthly'
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail

  AlarmsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref AlarmsTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # --- Amazon Quick データソースアクセス用ロール（S3 AP 読み取り） ---
  QuickDataSourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !If
                - HasQuickPrincipal
                - !Ref QuickDataSourcePrincipal
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      Policies:
        - PolicyName: QuickS3ApReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}/object/*'

  # --- Quick Flows アクション API（IAM 認証 + スロットリング） ---
  QuickActionApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: AWS_IAM
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10

  QuickActionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuickActionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:GetInferenceProfile
                Resource:
                  - 'arn:aws:bedrock:*::foundation-model/amazon.nova-*'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
              - Effect: Allow
                Action: bedrock:ApplyGuardrail
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*'
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref NotificationTopic

  QuickActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      Runtime: python3.12
      CodeUri: functions/quick_action/
      Timeout: 60
      MemorySize: 512
      Role: !GetAtt QuickActionRole.Arn
      Environment:
        Variables:
          BEDROCK_LLM_MODEL_ID: !Ref BedrockLlmModelId
          NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic
          BEDROCK_GUARDRAIL_ID: !Ref BedrockGuardrailId
          BEDROCK_GUARDRAIL_VERSION: !Ref BedrockGuardrailVersion
      Events:
        ActionApi:
          Type: Api
          Properties:
            RestApiId: !Ref QuickActionApi
            Path: /action
            Method: post

  # --- Athena Query Lambda（Quick Sight BI 基盤） ---
  AthenaQueryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaQueryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: !Sub 'arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${AthenaWorkGroup}'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetPartitions
                Resource:
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/quick_workspace_db'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/quick_workspace_db/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}/object/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt AthenaResultsBucket.Arn
                  - !Sub '${AthenaResultsBucket.Arn}/*'

  AthenaQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      Runtime: python3.12
      CodeUri: functions/athena_query/
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt AthenaQueryRole.Arn
      Environment:
        Variables:
          ATHENA_DATABASE: !Ref GlueDatabase
          ATHENA_WORKGROUP: !Ref AthenaWorkGroup
          ATHENA_OUTPUT_LOCATION: !Sub 's3://${AthenaResultsBucket}/athena-results/'
          ALLOW_RAW_SQL: !Ref AllowRawSql

  # --- Data Prep Lambda（Quick データソース準備マニフェスト） ---
  DataPrepRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DataPrepPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${S3AccessPointName}/object/*'

  DataPrepFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      Runtime: python3.12
      CodeUri: functions/data_prep/
      Timeout: 120
      MemorySize: 512
      Role: !GetAtt DataPrepRole.Arn
      Environment:
        Variables:
          S3_ACCESS_POINT_ALIAS: !Ref S3AccessPointAlias
          WORKSPACE_PREFIX: !Ref WorkspacePrefix

  PrepSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: !Ref PrepScheduleExpression
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt DataPrepFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{}'

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDataPrep
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DataPrepFunction.Arn

  # --- CloudWatch アラーム（Lambda エラー監視 / 可観測性） ---
  QuickActionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-quickaction-errors'
      AlarmDescription: Quick Flows Action Lambda のエラー検知
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref QuickActionFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmsTopic

  AthenaQueryErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-athenaquery-errors'
      AlarmDescription: Athena Query Lambda のエラー検知
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AthenaQueryFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmsTopic

  # --- CloudWatch ダッシュボード（可観測性） ---
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations / Errors",
                "region": "${AWS::Region}",
                "stat": "Sum", "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${QuickActionFunction}" ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "${QuickActionFunction}" ],
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${AthenaQueryFunction}" ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "${AthenaQueryFunction}" ],
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${DataPrepFunction}" ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "${DataPrepFunction}" ]
                ]
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Duration (p95)",
                "region": "${AWS::Region}",
                "stat": "p95", "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${QuickActionFunction}" ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "${AthenaQueryFunction}" ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "${DataPrepFunction}" ]
                ]
              }
            }
          ]
        }

Outputs:
  QuickActionApiEndpoint:
    Description: Quick Flows アクション API（IAM 認証、POST /action）
    Value: !Sub 'https://${QuickActionApi}.execute-api.${AWS::Region}.amazonaws.com/prod/action'
  QuickDataSourceRoleArn:
    Description: Amazon Quick データソースアクセス用ロール ARN（S3 AP 読み取り）
    Value: !GetAtt QuickDataSourceRole.Arn
  AthenaQueryFunctionArn:
    Description: Athena Query Lambda ARN（Quick Sight BI 基盤）
    Value: !GetAtt AthenaQueryFunction.Arn
  DataPrepFunctionArn:
    Description: Data Prep Lambda ARN（データソース準備マニフェスト）
    Value: !GetAtt DataPrepFunction.Arn
  GlueDatabaseName:
    Description: Glue Database 名
    Value: !Ref GlueDatabase
  AthenaWorkGroupName:
    Description: Athena WorkGroup 名
    Value: !Ref AthenaWorkGroup
  NotificationTopicArn:
    Value: !Ref NotificationTopic
