name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint deployment templates
        run: cfn-lint solutions/**/template-deploy.yaml --ignore-checks W || echo "::warning::cfn-lint found issues in deployment templates (non-blocking)"
      - name: Validate self-contained SAM templates (Issue #53 regression guard)
        run: python3 scripts/validate_sam_templates.py
