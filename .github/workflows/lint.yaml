name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install ruff
        # Pin to the requirements-dev.txt version so `ruff format --check` is reproducible
        # (a floating `pip install ruff` can drift the formatter target between runs).
        run: pip install ruff==0.15.17
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint deployment templates
        run: cfn-lint solutions/**/template-deploy.yaml --ignore-checks W || echo "::warning::cfn-lint found issues in deployment templates (non-blocking)"
      - name: Validate self-contained SAM templates (Issue #53 regression guard)
        run: python3 scripts/validate_sam_templates.py
      - name: Check README deploy params match templates (Issue #53 regression guard)
        run: python3 scripts/check_readme_param_names.py
      - name: Check deploy-doc parity across languages
        run: python3 scripts/check_readme_deploy_parity.py
