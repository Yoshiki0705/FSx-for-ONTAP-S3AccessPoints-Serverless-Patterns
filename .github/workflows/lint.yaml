name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint CloudFormation templates (Phase 1)
        run: cfn-lint */template.yaml
      - name: Lint CloudFormation templates (Phase 2)
        run: |
          cfn-lint semiconductor-eda/template.yaml
          cfn-lint genomics-pipeline/template.yaml
          cfn-lint energy-seismic/template.yaml
          cfn-lint autonomous-driving/template.yaml
          cfn-lint construction-bim/template.yaml
          cfn-lint retail-catalog/template.yaml
          cfn-lint logistics-ocr/template.yaml
          cfn-lint education-research/template.yaml
          cfn-lint insurance-claims/template.yaml
