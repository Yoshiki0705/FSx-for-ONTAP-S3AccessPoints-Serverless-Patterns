name: DevSecOps Validators
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  s3ap-iam-patterns:
    name: "S3AP IAM alias+ARN pattern check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Run S3AP IAM validator
        run: python3 scripts/check_s3ap_iam_patterns.py

  handler-name-check:
    name: "Handler undefined-name sweep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install pyflakes
        run: pip install pyflakes
      - name: Check handler undefined names
        run: python3 scripts/check_handler_names.py

  conditional-refs-check:
    name: "UC9-class conditional resource ref check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Check conditional refs
        run: python3 scripts/check_conditional_refs.py

  python-quality:
    name: "Pyflakes quality sweep (CRITICAL only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install pyflakes
        run: pip install pyflakes
      - name: Run quality check
        run: python3 scripts/check_python_quality.py

  sensitive-leak-check:
    name: "Screenshot OCR sensitive-leak scan"
    runs-on: ubuntu-latest
    # The full leak scanner requires _sensitive_strings.py (gitignored).
    # On CI we use a CI-oriented mode that sources literals from a
    # repository secret so PR authors can't exfiltrate the sensitive list.
    # Skipped on PRs from forks because secrets are unavailable there.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install tesseract + Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-jpn
          pip install pillow pytesseract
      - name: Materialise sensitive strings from secret
        env:
          SENSITIVE_STRINGS_PY: ${{ secrets.SENSITIVE_STRINGS_PY }}
        run: |
          if [ -z "$SENSITIVE_STRINGS_PY" ]; then
            echo "SENSITIVE_STRINGS_PY secret not configured — using example (no-op) file."
            cp scripts/_sensitive_strings.py.example scripts/_sensitive_strings.py
          else
            printf '%s' "$SENSITIVE_STRINGS_PY" > scripts/_sensitive_strings.py
          fi
      - name: Run sensitive-leak scan
        run: python3 scripts/_check_sensitive_leaks.py

  cfn-guard-security:
    name: "cfn-guard IAM security rules"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install cfn-guard
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/aws-cloudformation/cloudformation-guard/main/install-guard.sh | sh
          echo "$HOME/.guard/bin" >> $GITHUB_PATH
      - name: Run cfn-guard validation
        run: |
          cfn-guard validate \
            --rules security/cfn-guard-rules/ \
            --data solutions/**/template-deploy.yaml \
            --show-summary fail || true

  deprecated-models-check:
    name: "Bedrock model EOL guardrail"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Check for deprecated/EOL Bedrock model IDs
        run: python3 scripts/check_deprecated_models.py

  bedrock-inference-profile-check:
    name: "Bedrock inference-profile guard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Self-test the guard
        run: python3 scripts/check_bedrock_inference_profile.py --selftest
      - name: Check Bedrock inference-profile compliance
        run: python3 scripts/check_bedrock_inference_profile.py

  actions-pinning-check:
    name: "Actions SHA pinning check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Check third-party Actions are SHA-pinned
        run: python3 scripts/check_actions_pinning.py

  dependency-audit:
    name: "Dependency vulnerability audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --desc

  validators-summary:
    name: "Validators Summary"
    runs-on: ubuntu-latest
    needs:
      - s3ap-iam-patterns
      - handler-name-check
      - conditional-refs-check
      - python-quality
      - sensitive-leak-check
      - cfn-guard-security
      - deprecated-models-check
      - bedrock-inference-profile-check
      - actions-pinning-check
      - dependency-audit
    if: always()
    steps:
      - name: Evaluate
        run: |
          declare -A results=(
            ["s3ap-iam-patterns"]="${{ needs.s3ap-iam-patterns.result }}"
            ["handler-name-check"]="${{ needs.handler-name-check.result }}"
            ["conditional-refs-check"]="${{ needs.conditional-refs-check.result }}"
            ["python-quality"]="${{ needs.python-quality.result }}"
            ["sensitive-leak-check"]="${{ needs.sensitive-leak-check.result }}"
            ["deprecated-models-check"]="${{ needs.deprecated-models-check.result }}"
            ["bedrock-inference-profile-check"]="${{ needs.bedrock-inference-profile-check.result }}"
            ["actions-pinning-check"]="${{ needs.actions-pinning-check.result }}"
            ["dependency-audit"]="${{ needs.dependency-audit.result }}"
          )
          failed=0
          for name in "${!results[@]}"; do
            status="${results[$name]}"
            printf '  %-28s %s\n' "$name" "$status"
            if [ "$status" = "failure" ]; then failed=$((failed+1)); fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed Phase 8 validator(s) failed"
            exit 1
          fi
          echo "✅ All Phase 8 validators passed"
