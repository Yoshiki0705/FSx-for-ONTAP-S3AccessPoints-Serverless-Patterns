name: IAM Policy Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "solutions/**/template.yaml"
      - "infrastructure/**/*.yaml"
      - "solutions/amplify-portal/amplify/**"

permissions:
  contents: read
  id-token: write  # Required for OIDC auth to AWS

jobs:
  validate-iam:
    name: "Validate IAM Policies (Access Analyzer)"
    runs-on: ubuntu-latest
    # Only run when AWS credentials are available (skip for external PRs)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install boto3 pyyaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ secrets.IAM_VALIDATION_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true
        id: aws-creds

      - name: Validate IAM policies in SAM templates
        if: steps.aws-creds.outcome == 'success'
        run: |
          echo "::group::Finding templates with IAM policies"
          TEMPLATES=$(find solutions/industry -name "template.yaml" | head -20)
          INFRA_TEMPLATES=$(find infrastructure -name "*.yaml" 2>/dev/null || true)
          echo "Found: $(echo $TEMPLATES $INFRA_TEMPLATES | wc -w) templates"
          echo "::endgroup::"

          if [ -n "$TEMPLATES" ] || [ -n "$INFRA_TEMPLATES" ]; then
            python scripts/validate-iam-policies.py --ci $TEMPLATES $INFRA_TEMPLATES
          else
            echo "No templates to validate"
          fi

      - name: Skip notice (no AWS credentials)
        if: steps.aws-creds.outcome != 'success'
        run: |
          echo "::notice::IAM policy validation skipped (AWS credentials not configured). "
          echo "To enable: create an IAM role with accessanalyzer:ValidatePolicy permission "
          echo "and set IAM_VALIDATION_ROLE_ARN secret."
