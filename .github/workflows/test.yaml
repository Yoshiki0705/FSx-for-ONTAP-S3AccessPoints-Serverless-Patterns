name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests with coverage
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest shared/tests/ --cov=shared --cov-report=xml --cov-fail-under=80 -v
      - name: Run property-based tests
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest shared/tests/test_properties.py -v

  cfn-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Validate all UC templates (YAML parse)
        run: |
          python3 -c "
          from cfnlint.decode import cfn_yaml
          import sys, glob
          errors = []
          for tpl in sorted(glob.glob('solutions/**/template.yaml', recursive=True)):
              try:
                  cfn_yaml.load(tpl)
              except Exception as e:
                  errors.append(f'{tpl}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All {len(glob.glob(\"solutions/**/template.yaml\", recursive=True))} templates parsed successfully')
          "
      - name: Verify TriggerMode integration
        run: |
          python3 -c "
          from cfnlint.decode import cfn_yaml
          import sys, glob
          errors = []
          for tpl in sorted(glob.glob('solutions/**/template.yaml', recursive=True)):
              if 'event-driven' in tpl or 'sap' in tpl or 'flexcache' in tpl or 'ha/' in tpl or 'edge/' in tpl or 'genai/' in tpl:
                  continue
              template = cfn_yaml.load(tpl)
              params = template.get('Parameters', {})
              conditions = template.get('Conditions', {})
              # Not every industry pattern implements TriggerMode, and those that do have
              # legitimately diverged in condition naming (IsPolling/IsEventDriven vs
              # IsPollingOrHybrid vs EnablePolling). Enforce the invariant that actually
              # matters: a declared TriggerMode parameter must be wired to at least one
              # Condition (not left orphaned).
              if 'TriggerMode' not in params:
                  continue
              if 'TriggerMode' not in str(conditions):
                  errors.append(f'{tpl}: declares TriggerMode but no Condition references it')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('TriggerMode integration verified')
          "
