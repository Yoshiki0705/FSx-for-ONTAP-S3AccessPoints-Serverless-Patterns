name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests with coverage
        run: pytest shared/tests/ --cov=shared --cov-report=xml --cov-fail-under=80 -v
      - name: Run property-based tests
        run: pytest shared/tests/test_properties.py -v
      - name: Run Phase 2 shared property-based tests
        run: pytest shared/tests/test_properties_phase2.py -v
      - name: Run Phase 2 shared unit tests
        run: |
          pytest shared/tests/test_cross_region_client.py -v
          pytest shared/tests/test_s3ap_helper_phase2.py -v

  uc-test-phase2:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        uc:
          - semiconductor-eda
          - genomics-pipeline
          - energy-seismic
          - autonomous-driving
          - construction-bim
          - retail-catalog
          - logistics-ocr
          - education-research
          - insurance-claims
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run ${{ matrix.uc }} tests
        run: pytest ${{ matrix.uc }}/tests/ -v
