name: CI - Test & Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: "Stage 1: CloudFormation Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint all CloudFormation templates
        id: cfn-lint
        run: |
          cfn-lint '**/*.yaml' --ignore-templates '**/node_modules/**' || echo "lint_failed=true" >> $GITHUB_ENV
      - name: Set lint outcome
        if: env.lint_failed == 'true'
        run: echo "LINT_RESULT=failure" >> $GITHUB_OUTPUT

  test:
    name: "Stage 2: Unit Tests & PBT"
    runs-on: ubuntu-latest
    if: always()
    env:
      # Dummy region/creds so module-level boto3 clients don't raise NoRegionError at import.
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache Hypothesis database
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .hypothesis
          key: ${{ runner.os }}-hypothesis-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-hypothesis-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run shared tests with coverage
        run: |
          pytest \
            shared/tests/ \
            --cov=shared \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v --ignore=.hypothesis
      - name: Run pattern tests
        # Each pattern runs in its OWN pytest invocation. Many patterns ship a
        # functions/ package with colliding module names (e.g. functions.discovery),
        # so a single combined invocation raises ModuleNotFoundError as sys.modules
        # caches the first pattern's package. A fresh process per pattern avoids this.
        # See AGENTS.md "from functions.xxx import collision in batch test runs".
        run: |
          set -e
          PATTERNS="
            solutions/industry/legal-compliance
            solutions/industry/financial-idp
            solutions/industry/manufacturing-analytics
            solutions/industry/media-vfx
            solutions/industry/healthcare-dicom
            solutions/industry/semiconductor-eda
            solutions/industry/genomics-pipeline
            solutions/industry/energy-seismic
            solutions/industry/autonomous-driving
            solutions/industry/construction-bim
            solutions/industry/retail-catalog
            solutions/industry/logistics-ocr
            solutions/industry/education-research
            solutions/industry/insurance-claims
            solutions/industry/defense-satellite
            solutions/industry/government-archives
            solutions/industry/smart-city-geospatial
            solutions/sap/erp-adjacent
            solutions/flexcache/anycast-dr
            solutions/flexcache/dynamic-render-workflow
            solutions/flexcache/rag-enterprise-files
            solutions/flexcache/automotive-cae
            solutions/flexcache/life-sciences-research
            solutions/flexcache/gaming-build-pipeline
            solutions/genai/kb-selfservice-curation
            solutions/genai/quick-agentic-workspace
            solutions/ha/lifekeeper-monitoring
            solutions/event-driven/prototype
            solutions/edge/content-delivery
            solutions/flexcache/devops-cicd
          "
          for d in $PATTERNS; do
            echo "::group::pytest $d"
            pytest "$d/tests/" -q --ignore=.hypothesis
            echo "::endgroup::"
          done
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  security-cfn:
    name: "Stage 3: cfn-guard Security"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install cfn-guard
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/aws-cloudformation/cloudformation-guard/main/install-guard.sh | sh
          export PATH=~/.guard/bin:$PATH
          echo "$HOME/.guard/bin" >> $GITHUB_PATH
      - name: Run cfn-guard validation
        # Advisory scan (matches validators.yml cfn-guard-security). The prior quoted
        # '**/*.yaml' was passed literally and failed with "path does not exist".
        run: |
          cfn-guard validate \
            --rules security/cfn-guard-rules/ \
            --data solutions/**/template-deploy.yaml \
            --show-summary fail || true

  security-python:
    name: "Stage 4: Python Security Scan"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run Bandit scan
        run: |
          bandit -r shared/ solutions/ \
            -ll -c .bandit \
            -f json -o bandit-report.json || true
          bandit -r shared/ solutions/industry/legal-compliance/ \
            solutions/industry/financial-idp/ solutions/industry/manufacturing-analytics/ \
            -ll -c .bandit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bandit-report
          path: bandit-report.json

  final-status:
    name: "CI Final Status"
    runs-on: ubuntu-latest
    needs: [lint, test, security-cfn, security-python]
    if: always()
    steps:
      - name: Check all stages
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.security-cfn.result }}" == "failure" ]] || \
             [[ "${{ needs.security-python.result }}" == "failure" ]]; then
            echo "❌ One or more CI stages failed"
            echo "  Lint: ${{ needs.lint.result }}"
            echo "  Test: ${{ needs.test.result }}"
            echo "  Security (CFN): ${{ needs.security-cfn.result }}"
            echo "  Security (Python): ${{ needs.security-python.result }}"
            exit 1
          fi
          echo "✅ All CI stages passed"
