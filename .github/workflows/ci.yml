name: CI - Test & Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: "Stage 1: CloudFormation Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint all CloudFormation templates
        id: cfn-lint
        run: |
          cfn-lint '**/*.yaml' --ignore-templates '**/node_modules/**' || echo "lint_failed=true" >> $GITHUB_ENV
      - name: Set lint outcome
        if: env.lint_failed == 'true'
        run: echo "LINT_RESULT=failure" >> $GITHUB_OUTPUT

  test:
    name: "Stage 2: Unit Tests & PBT"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache Hypothesis database
        uses: actions/cache@v4
        with:
          path: .hypothesis
          key: ${{ runner.os }}-hypothesis-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-hypothesis-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: |
          pytest \
            shared/tests/ \
            legal-compliance/tests/ \
            financial-idp/tests/ \
            manufacturing-analytics/tests/ \
            media-vfx/tests/ \
            healthcare-dicom/tests/ \
            semiconductor-eda/tests/ \
            genomics-pipeline/tests/ \
            energy-seismic/tests/ \
            autonomous-driving/tests/ \
            construction-bim/tests/ \
            retail-catalog/tests/ \
            logistics-ocr/tests/ \
            education-research/tests/ \
            insurance-claims/tests/ \
            defense-satellite/tests/ \
            government-archives/tests/ \
            smart-city-geospatial/tests/ \
            sap-erp-adjacent/tests/ \
            flexcache-anycast-dr/tests/ \
            dynamic-flexcache-render-workflow/tests/ \
            genai-rag-enterprise-files/tests/ \
            automotive-cae/tests/ \
            life-sciences-research/tests/ \
            gaming-build-pipeline/tests/ \
            --cov=shared \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --import-mode=importlib \
            -v --ignore=.hypothesis
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  security-cfn:
    name: "Stage 3: cfn-guard Security"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Install cfn-guard
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/aws-cloudformation/cloudformation-guard/main/install-guard.sh | sh
          export PATH=~/.guard/bin:$PATH
          echo "$HOME/.guard/bin" >> $GITHUB_PATH
      - name: Run cfn-guard validation
        run: |
          find . -name "template-deploy.yaml" -not -path "*/node_modules/*" | while read tpl; do
            echo "Validating: $tpl"
            cfn-guard validate --rules security/cfn-guard-rules/ --data "$tpl" --show-summary all || true
          done

  security-python:
    name: "Stage 4: Python Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run Bandit scan
        run: |
          bandit -r shared/ \
            legal-compliance/ financial-idp/ manufacturing-analytics/ \
            media-vfx/ healthcare-dicom/ semiconductor-eda/ \
            genomics-pipeline/ energy-seismic/ autonomous-driving/ \
            construction-bim/ retail-catalog/ logistics-ocr/ \
            education-research/ insurance-claims/ defense-satellite/ \
            government-archives/ smart-city-geospatial/ sap-erp-adjacent/ \
            flexcache-anycast-dr/ dynamic-flexcache-render-workflow/ \
            genai-rag-enterprise-files/ automotive-cae/ \
            life-sciences-research/ gaming-build-pipeline/ \
            -ll -c .bandit \
            -f json -o bandit-report.json || true
          bandit -r shared/ \
            legal-compliance/ financial-idp/ manufacturing-analytics/ \
            -ii -c .bandit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  final-status:
    name: "CI Final Status"
    runs-on: ubuntu-latest
    needs: [lint, test, security-cfn, security-python]
    if: always()
    steps:
      - name: Check all stages
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.security-cfn.result }}" == "failure" ]]; then
            echo "❌ One or more CI stages failed"
            echo "  Lint: ${{ needs.lint.result }}"
            echo "  Test: ${{ needs.test.result }}"
            echo "  Security (CFN): ${{ needs.security-cfn.result }}"
            echo "  Security (Python): ${{ needs.security-python.result }}"
            exit 1
          fi
          echo "✅ All CI stages passed"
