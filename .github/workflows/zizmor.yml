name: GitHub Actions Security Lint (zizmor)

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    # 毎週月曜 09:00 UTC (日本時間 18:00)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    name: zizmor (Actions Security Lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install zizmor
        run: |
          pip install zizmor

      - name: Run zizmor scan
        run: |
          echo "🔍 GitHub Actions セキュリティリント実行中..."
          zizmor --format sarif . > zizmor-results.sarif || true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor

      - name: Run zizmor (human-readable output)
        run: |
          echo "📋 zizmor 結果サマリー:"
          zizmor . || true
