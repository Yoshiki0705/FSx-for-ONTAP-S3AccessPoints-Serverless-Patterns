# ⚠️ NOTE: This file is for SAM local testing only.
# The authoritative deployment template is template-deploy.yaml.
# Edit template-deploy.yaml for production changes.
#
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: UC16 Government Archives SAM template for local testing

Globals:
  Function:
    Runtime: python3.13
    Timeout: 300
    MemorySize: 1024
    Environment:
      Variables:
        OUTPUT_BUCKET: !Ref OutputBucket

Parameters:
  S3AccessPoint:
    Type: String
    Default: "test-ap-ext-s3alias"
  OutputBucket:
    Type: String
    Default: "test-output-bucket"

  # --- TriggerMode (Phase 11 Req 1) ---
  TriggerMode:
    Type: String
    Default: "POLLING"
    AllowedValues: ["POLLING", "EVENT_DRIVEN", "HYBRID"]
    Description: >
      トリガーモードの選択。
      POLLING: 既存の EventBridge Scheduler + Discovery Lambda（デフォルト）。
      EVENT_DRIVEN: FPolicy イベント駆動のみ（Scheduler 無効化）。
      HYBRID: 両方有効（Idempotency Store で重複排除）。
  FPolicyEventBusName:
    Type: String
    Default: "fsxn-fpolicy-events"
    Description: FPolicy EventBridge カスタムバス名（EVENT_DRIVEN / HYBRID 時に使用）

# =====================================================================
# Conditions
# =====================================================================
Conditions:
  # TriggerMode Conditions
  IsPolling:
    !Equals [!Ref TriggerMode, "POLLING"]
  IsEventDriven:
    !Equals [!Ref TriggerMode, "EVENT_DRIVEN"]
  IsHybrid:
    !Equals [!Ref TriggerMode, "HYBRID"]
  IsPollingOrHybrid:
    !Or
      - !Condition IsPolling
      - !Condition IsHybrid
  IsEventDrivenOrHybrid:
    !Or
      - !Condition IsEventDriven
      - !Condition IsHybrid

Resources:
  DiscoveryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/discovery/
      Handler: handler.handler
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          S3_ACCESS_POINT: !Ref S3AccessPoint

  OcrFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/ocr/
      Handler: handler.handler

  ClassificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/classification/
      Handler: handler.handler
      MemorySize: 512
      Timeout: 180

  EntityExtractionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/entity_extraction/
      Handler: handler.handler
      MemorySize: 512
      Timeout: 300

  RedactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/redaction/
      Handler: handler.handler
      MemorySize: 512
      Timeout: 180

  IndexGenerationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/index_generation/
      Handler: handler.handler
      MemorySize: 512
      Timeout: 180

  ComplianceCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/compliance_check/
      Handler: handler.handler
      MemorySize: 256
      Timeout: 60

  FoiaDeadlineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./functions/foia_deadline_reminder/
      Handler: handler.handler
      MemorySize: 256
      Timeout: 300

  # -----------------------------------------------------------------
  # FPolicy EventBridge Rule (EVENT_DRIVEN / HYBRID)
  # -----------------------------------------------------------------
  FPolicyEventRuleRole:
    Type: AWS::IAM::Role
    Condition: IsEventDrivenOrHybrid
    Properties:
      RoleName: !Sub "${AWS::StackName}-fpolicy-rule-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt DiscoveryFunction.Arn

  FPolicyArchivesRule:
    Type: AWS::Events::Rule
    Condition: IsEventDrivenOrHybrid
    Properties:
      Name: !Sub "${AWS::StackName}-fpolicy-trigger"
      EventBusName: !Ref FPolicyEventBusName
      EventPattern:
        source:
          - "fsxn.fpolicy"
        detail-type:
          - "FPolicy File Operation"
        detail:
          operation_type:
              - "create"
              - "write"
              - "rename"
              - "delete"
          file_path:
              - prefix: "/government/"
              - prefix: "/archives/"
              - prefix: "/records/"
              - suffix: ".pdf"
              - suffix: ".tiff"
              - suffix: ".xml"
      State: ENABLED
      Targets:
        - Id: lambda-target
          Arn: !GetAtt DiscoveryFunction.Arn

  FPolicyLambdaPermission:
    Type: AWS::Lambda::Permission
    Condition: IsEventDrivenOrHybrid
    Properties:
      FunctionName: !Ref DiscoveryFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FPolicyArchivesRule.Arn
