name: Validate CloudFormation Templates

on:
  push:
    paths:
      - 'infrastructure/handson-lab/cloudformation/**'
      - 'infrastructure/handson-lab/lambda/**'
  pull_request:
    paths:
      - 'infrastructure/handson-lab/cloudformation/**'
      - 'infrastructure/handson-lab/lambda/**'

permissions:
  contents: read

jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Run cfn-lint
        run: |
          cfn-lint infrastructure/handson-lab/cloudformation/*.yaml

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Lambda functions
        run: |
          ruff check infrastructure/handson-lab/lambda/
          ruff format --check infrastructure/handson-lab/lambda/
