# =============================================================================
# Secrets Rotation — Lambda + IAM Role + RotationSchedule
# =============================================================================
#
# ONTAP fsxadmin 認証情報の自動ローテーション Lambda。
# Secrets Manager の 4 ステップローテーションプロトコルに準拠。
# 90 日間隔で自動実行。
#
# 使用方法:
#   aws cloudformation deploy \
#     --template-file shared/cfn/secrets-rotation.yaml \
#     --stack-name fsxn-secrets-rotation \
#     --parameter-overrides \
#       EnableSecretsRotation=true \
#       SecretArn=arn:aws:secretsmanager:... \
#       VpcId=vpc-xxx \
#       SubnetIds=subnet-xxx,subnet-yyy \
#       SecurityGroupId=sg-xxx \
#     --capabilities CAPABILITY_NAMED_IAM
#
# オプトイン制御:
#   EnableSecretsRotation=false (デフォルト) でリソースは作成されない。
#
# =============================================================================

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  FSxN S3AP Serverless Patterns — Secrets Rotation Lambda.
  ONTAP fsxadmin パスワードの自動ローテーション（90日間隔）。

Parameters:
  ProjectPrefix:
    Type: String
    Default: "fsxn-s3ap"
    Description: リソース命名プレフィックス

  EnableSecretsRotation:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Secrets Rotation 機能を有効化する

  SecretArn:
    Type: String
    Default: ""
    Description: ローテーション対象の Secrets Manager シークレット ARN

  OntapMgmtIp:
    Type: String
    Default: ""
    Description: ONTAP SVM 管理 IP アドレス

  SvmUuid:
    Type: String
    Default: ""
    Description: ONTAP クラスター UUID（fsxadmin アカウントの owner UUID。/api/cluster で取得可能）

  RotationIntervalDays:
    Type: Number
    Default: 90
    Description: ローテーション間隔（日数）

  VpcId:
    Type: String
    Default: ""
    Description: Lambda を配置する VPC ID

  SubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Lambda を配置する Private Subnet IDs

  SecurityGroupId:
    Type: String
    Default: ""
    Description: Lambda 用 Security Group ID

  SnsTopicArn:
    Type: String
    Default: ""
    Description: 失敗通知用 SNS Topic ARN

Conditions:
  IsSecretsRotationEnabled:
    !Equals [!Ref EnableSecretsRotation, "true"]

Resources:
  RotationLambdaRole:
    Type: AWS::IAM::Role
    Condition: IsSecretsRotationEnabled
    Properties:
      RoleName: !Sub "${ProjectPrefix}-secrets-rotation-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsRotationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SecretsManagerAccess
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref SecretArn
              - Sid: SNSPublish
                Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref SnsTopicArn

  RotationLambdaFunction:
    Type: AWS::Serverless::Function
    Condition: IsSecretsRotationEnabled
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-secrets-rotation"
      Runtime: python3.12
      Handler: handler.handler
      CodeUri: ../lambdas/secrets_rotation/
      MemorySize: 256
      Timeout: 120
      Architectures:
        - arm64
      Role: !GetAtt RotationLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          ONTAP_MGMT_IP: !Ref OntapMgmtIp
          CLUSTER_UUID: !Ref SvmUuid
          SNS_TOPIC_ARN: !Ref SnsTopicArn
      Tags:
        Component: secrets-rotation
        Phase: "12"

  RotationLambdaPermission:
    Type: AWS::Lambda::Permission
    Condition: IsSecretsRotationEnabled
    Properties:
      FunctionName: !Ref RotationLambdaFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com

  SecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Condition: IsSecretsRotationEnabled
    Properties:
      SecretId: !Ref SecretArn
      RotationLambdaARN: !GetAtt RotationLambdaFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: !Ref RotationIntervalDays

Outputs:
  RotationLambdaArn:
    Condition: IsSecretsRotationEnabled
    Description: Secrets Rotation Lambda ARN
    Value: !GetAtt RotationLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RotationLambdaArn"

  RotationRoleArn:
    Condition: IsSecretsRotationEnabled
    Description: Secrets Rotation IAM Role ARN
    Value: !GetAtt RotationLambdaRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RotationRoleArn"
