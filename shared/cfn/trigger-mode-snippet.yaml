# =====================================================================
# TriggerMode パラメータ + Conditions スニペット
# 各 UC テンプレートの Parameters / Conditions セクションに追加する。
#
# Phase 10 スコープ:
#   - shared FPolicy → SQS → EventBridge パイプラインの E2E 検証完了
#   - TriggerMode パラメータの scaffolding（legal-compliance に参照実装）
#   - UC-specific Step Functions dispatch rules は Phase 11 で実装
#
# Phase 11 スコープ:
#   - 全 17 UC テンプレートへの TriggerMode 統合
#   - UC 別 EventBridge Rule（ファイルパスプレフィックス/拡張子フィルタ）
#   - Idempotency Store による HYBRID モード重複排除
# =====================================================================
#
# 使い方:
#   1. Parameters セクションに TriggerMode + FPolicyEventBusName を追加
#   2. Conditions セクションに IsPolling / IsEventDriven / IsHybrid を追加
#   3. EventBridge Scheduler リソースに Condition: IsPollingOrHybrid を追加
#   4. FPolicy EventBridge Rule リソースに Condition: IsEventDrivenOrHybrid を追加
#
# =====================================================================

# --- Parameters ---
# TriggerMode:
#   Type: String
#   Default: "POLLING"
#   AllowedValues: ["POLLING", "EVENT_DRIVEN", "HYBRID"]
#   Description: >
#     トリガーモードの選択。
#     POLLING: 既存の EventBridge Scheduler + Discovery Lambda（デフォルト）。
#     EVENT_DRIVEN: FPolicy イベント駆動のみ（Scheduler 無効化）。
#     HYBRID: 両方有効（Idempotency Store で重複排除）。
#
# FPolicyEventBusName:
#   Type: String
#   Default: "fsxn-fpolicy-events"
#   Description: FPolicy EventBridge カスタムバス名（EVENT_DRIVEN / HYBRID 時に使用）

# --- Conditions ---
# IsPolling:
#   !Equals [!Ref TriggerMode, "POLLING"]
# IsEventDriven:
#   !Equals [!Ref TriggerMode, "EVENT_DRIVEN"]
# IsHybrid:
#   !Equals [!Ref TriggerMode, "HYBRID"]
# IsPollingOrHybrid:
#   !Or
#     - !Condition IsPolling
#     - !Condition IsHybrid
# IsEventDrivenOrHybrid:
#   !Or
#     - !Condition IsEventDriven
#     - !Condition IsHybrid

# --- EventBridge Scheduler (既存) に Condition 追加 ---
# EventBridgeScheduler:
#   Type: AWS::Scheduler::Schedule
#   Condition: IsPollingOrHybrid
#   Properties: ...

# --- FPolicy EventBridge Rule (新規) ---
# FPolicyEventRule:
#   Type: AWS::Events::Rule
#   Condition: IsEventDrivenOrHybrid
#   Properties:
#     Name: !Sub "${AWS::StackName}-fpolicy-trigger"
#     EventBusName: !Ref FPolicyEventBusName
#     EventPattern:
#       source:
#         - "fsxn.fpolicy"
#       detail-type:
#         - "FPolicy File Operation"
#       detail:
#         operation_type:
#           - "create"
#           - "write"
#           - "delete"
#           - "rename"
#         # UC 固有のフィルタ例:
#         # file_path:
#         #   - prefix: "legal/"
#         # または拡張子フィルタ:
#         # file_path:
#         #   - suffix: ".pdf"
#     State: ENABLED
#     Targets:
#       - Id: step-functions-target
#         Arn: !GetAtt StateMachine.Arn
#         RoleArn: !GetAtt EventBridgeToStepFunctionsRole.Arn

# --- Idempotency Check (HYBRID モード用) ---
# HYBRID モードでは、Step Functions の最初のステップで
# Idempotency Store (DynamoDB) を参照し、重複イベントをスキップする。
# fpolicy-routing.yaml スタックの IdempotencyStore を使用する。
