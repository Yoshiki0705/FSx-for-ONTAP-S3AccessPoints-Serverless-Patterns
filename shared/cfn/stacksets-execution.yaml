AWSTemplateFormatVersion: "2010-09-09"
Description: >
  StackSets Execution Role — ターゲットアカウント用.
  CloudFormation StackSets がターゲットアカウントでリソースを作成するための
  最小権限 IAM ロール。Organization ID 条件付き信頼ポリシー。

Parameters:
  AdministratorAccountId:
    Type: String
    Description: StackSets 管理アカウント ID（12 桁）
    AllowedPattern: "^\\d{12}$"

  OrganizationId:
    Type: String
    Default: ""
    Description: |
      AWS Organization ID（o-xxxxxxxxxx 形式）。
      指定すると Organization 条件付き信頼ポリシーを使用。
      空の場合は AdministratorAccountId のみ信頼。

Conditions:
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, ""]]

Resources:
  StackSetsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSCloudFormationStackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AdministratorAccountId}:root"
            Action: sts:AssumeRole
            Condition: !If
              - HasOrganizationId
              - StringEquals:
                  aws:PrincipalOrgID: !Ref OrganizationId
              - !Ref "AWS::NoValue"
      Policies:
        - PolicyName: FSxNS3APStackSetsExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Lambda
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:CreateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:GetEventSourceMapping
                  - lambda:ListTags
                  - lambda:TagResource
                  - lambda:UntagResource
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:fsxn-*"
              # Step Functions
              - Effect: Allow
                Action:
                  - states:CreateStateMachine
                  - states:DeleteStateMachine
                  - states:UpdateStateMachine
                  - states:DescribeStateMachine
                  - states:TagResource
                  - states:UntagResource
                  - states:ListTagsForResource
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:fsxn-*"
              # DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:ListTagsOfResource
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:DescribeContinuousBackups
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/fsxn-*"
              # S3
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                Resource: "arn:aws:s3:::fsxn-*"
              # CloudWatch
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DescribeLogGroups
                  - logs:TagResource
                Resource: "*"
              # EventBridge
              - Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:DescribeRule
                  - events:ListTargetsByRule
                  - scheduler:CreateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:GetSchedule
                Resource: "*"
              # SNS
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:SetTopicAttributes
                  - sns:GetTopicAttributes
                  - sns:TagResource
                Resource: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:fsxn-*"
              # SQS
              - Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:SetQueueAttributes
                  - sqs:GetQueueAttributes
                  - sqs:TagQueue
                Resource: !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:fsxn-*"
              # Secrets Manager
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:fsxn-*"
              # IAM (for creating Lambda execution roles)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/fsxn-*"
              # CloudFormation (for nested stacks)
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/fsxn-*/*"

Outputs:
  ExecutionRoleArn:
    Description: StackSets Execution Role ARN
    Value: !GetAtt StackSetsExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ExecutionRoleArn"
