AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  CloudFormation Guard Hooks — デプロイ時ポリシー強制スタック
  cfn-guard ルールを S3 から読み込み、CloudFormation Hook として登録する。
  UC テンプレートとは独立してデプロイ・管理する。

# =====================================================================
# Parameters
# =====================================================================
Parameters:
  GuardRulesBucketName:
    Type: String
    Description: cfn-guard ルールファイルを格納する S3 バケット名

  GuardRulesKeyPrefix:
    Type: String
    Default: "cfn-guard-rules/"
    Description: S3 バケット内のルールファイルプレフィックス

  FailureMode:
    Type: String
    Default: "WARN"
    AllowedValues:
      - "FAIL"
      - "WARN"
    Description: >-
      Hook 失敗時の動作モード。
      FAIL: ルール違反時にデプロイをブロックする。
      WARN: ルール違反時に警告のみ出力し、デプロイは続行する。

  HookAlias:
    Type: String
    Default: "FSxNS3AP::Guard::Hook"
    AllowedPattern: "^(?!(?i)aws)[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}$"
    Description: Guard Hook のエイリアス名（アカウント・リージョン内で一意）

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: Hook 実行ログの保持日数

# =====================================================================
# Resources
# =====================================================================
Resources:

  # -----------------------------------------------------------------
  # S3 Bucket for Guard Rules (ルールファイル格納用)
  # -----------------------------------------------------------------
  GuardRulesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref GuardRulesBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Component
          Value: guard-hooks
        - Key: Phase
          Value: "6B"

  # -----------------------------------------------------------------
  # IAM Role for Hook Execution
  # -----------------------------------------------------------------
  HookExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-hook-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: hooks.cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: HookExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !GetAtt GuardRulesBucket.Arn
                  - !Sub "${GuardRulesBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${GuardRulesBucket.Arn}/*"
      Tags:
        - Key: Component
          Value: guard-hooks
        - Key: Phase
          Value: "6B"

  # -----------------------------------------------------------------
  # CloudWatch Log Group for Hook Execution
  # -----------------------------------------------------------------
  HookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/cloudformation/hooks/${AWS::StackName}"
      RetentionInDays: !Ref LogRetentionDays

  # -----------------------------------------------------------------
  # CloudFormation Guard Hook
  # AWS::CloudFormation::GuardHook は cfn-guard ルールを CloudFormation Hook
  # として登録するためのリソースタイプ。
  # -----------------------------------------------------------------
  GuardHook:
    Type: AWS::CloudFormation::GuardHook
    Properties:
      Alias: !Ref HookAlias
      ExecutionRole: !GetAtt HookExecutionRole.Arn
      FailureMode: !Ref FailureMode
      HookStatus: ENABLED
      LogBucket: !Ref GuardRulesBucket
      RuleLocation:
        Uri: !Sub "s3://${GuardRulesBucket}/${GuardRulesKeyPrefix}"
      TargetOperations:
        - RESOURCE
        - STACK
      TargetFilters:
        Actions:
          - CREATE
          - UPDATE
      StackFilters:
        FilteringCriteria: ALL
        StackNames:
          Exclude:
            - !Ref "AWS::StackName"

# =====================================================================
# Outputs
# =====================================================================
Outputs:
  GuardRulesBucketName:
    Description: cfn-guard ルールファイル格納 S3 バケット名
    Value: !Ref GuardRulesBucket
    Export:
      Name: !Sub "${AWS::StackName}-GuardRulesBucket"

  HookExecutionRoleArn:
    Description: Hook 実行ロール ARN
    Value: !GetAtt HookExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-HookExecutionRoleArn"

  GuardHookAlias:
    Description: 登録された Guard Hook のエイリアス
    Value: !Ref HookAlias
    Export:
      Name: !Sub "${AWS::StackName}-GuardHookAlias"

  FailureModeOutput:
    Description: 現在の FailureMode 設定
    Value: !Ref FailureMode
