AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SnapMirror One-Click Sync — AWS Side Infrastructure
  FSx for NetApp ONTAP (SnapMirror Destination) + VPC + Site-to-Site VPN
  S3 Access Point は FSx 作成後に手動 or スクリプトで構成

# =============================================================================
# パラメータ
# =============================================================================
Parameters:
  # --- ネットワーク ---
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR ブロック

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: プライベートサブネット 1 (AZ-a)

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: プライベートサブネット 2 (AZ-c)

  # --- FSx for ONTAP ---
  FsxStorageCapacity:
    Type: Number
    Default: 1024
    MinValue: 1024
    Description: FSx ストレージ容量 (GiB)

  FsxThroughputCapacity:
    Type: Number
    Default: 128
    AllowedValues: [128, 256, 512, 1024, 2048]
    Description: FSx スループットキャパシティ (MBps)

  FsxDeploymentType:
    Type: String
    Default: SINGLE_AZ_2
    AllowedValues: [SINGLE_AZ_2, MULTI_AZ_2]
    Description: デプロイメントタイプ（デモは Single AZ で十分）

  SvmName:
    Type: String
    Default: svm_demo
    Description: Storage Virtual Machine 名

  VolumeName:
    Type: String
    Default: vol_demo
    Description: SnapMirror Destination ボリューム名

  VolumeSizeInMegabytes:
    Type: String
    Default: '102400'
    Description: ボリュームサイズ (MB) — デフォルト 100GB

  # --- VPN（オンプレミス接続） ---
  EnableVpn:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Site-to-Site VPN を作成するか。
      SnapMirror 通信は VPN トンネル内を通ります。
      VPN なしでのインターネット経由 SnapMirror はこのテンプレートではサポートしていません。
      イベント会場では AWS Client VPN の利用も検討してください（別途構成要）。

  OnPremPublicIp:
    Type: String
    Default: '0.0.0.0'
    Description: オンプレミス VPN ゲートウェイのパブリック IP

  OnPremCidr:
    Type: String
    Default: 192.168.0.0/16
    Description: オンプレミスネットワーク CIDR

  # --- Amazon Quick (参考情報) ---
  # Amazon Quick は SaaS のため CloudFormation で作成不可
  # Professional/Enterprise プランでは AWS アカウント連携で S3 データソースを接続

Conditions:
  CreateVpn: !Equals [!Ref EnableVpn, 'true']

# =============================================================================
# リソース
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC & ネットワーク
  # ---------------------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: snapmirror-demo-vpc

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: snapmirror-demo-private-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: snapmirror-demo-private-2

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: snapmirror-demo-private-rt

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # セキュリティグループ
  # ---------------------------------------------------------------------------
  FsxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: FSx for ONTAP security group
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        # SnapMirror (Intercluster LIF)
        - IpProtocol: tcp
          FromPort: 11104
          ToPort: 11104
          CidrIp: !Ref OnPremCidr
          Description: SnapMirror intercluster
        - IpProtocol: tcp
          FromPort: 11105
          ToPort: 11105
          CidrIp: !Ref OnPremCidr
          Description: SnapMirror data transfer
        # ICMP (cluster peering health check)
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: !Ref OnPremCidr
          Description: ICMP for cluster peering
        # ONTAP REST API from on-prem (for peering setup)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref OnPremCidr
          Description: ONTAP REST API from on-prem
        # NFS
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidr
          Description: NFS
        # SMB/CIFS
        - IpProtocol: tcp
          FromPort: 445
          ToPort: 445
          CidrIp: !Ref VpcCidr
          Description: SMB
        # ONTAP REST API / Management
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
          Description: ONTAP REST API
        # iSCSI (if needed)
        - IpProtocol: tcp
          FromPort: 3260
          ToPort: 3260
          CidrIp: !Ref VpcCidr
          Description: iSCSI
      Tags:
        - Key: Name
          Value: snapmirror-demo-fsx-sg

  # ---------------------------------------------------------------------------
  # FSx for NetApp ONTAP
  # ---------------------------------------------------------------------------
  FsxFileSystem:
    Type: AWS::FSx::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FileSystemType: ONTAP
      StorageCapacity: !Ref FsxStorageCapacity
      StorageType: SSD
      SubnetIds:
        - !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref FsxSecurityGroup
      OntapConfiguration:
        DeploymentType: !Ref FsxDeploymentType
        ThroughputCapacity: !Ref FsxThroughputCapacity
        # FSx ONTAP パスワード（デプロイ後に変更推奨）
        FsxAdminPassword: '{{resolve:ssm:/snapmirror-demo/fsx-admin-password}}'
        PreferredSubnetId: !Ref PrivateSubnet1
      Tags:
        - Key: Name
          Value: snapmirror-demo-fsxn

  FsxSvm:
    Type: AWS::FSx::StorageVirtualMachine
    Properties:
      FileSystemId: !Ref FsxFileSystem
      Name: !Ref SvmName
      Tags:
        - Key: Name
          Value: !Ref SvmName

  FsxVolume:
    Type: AWS::FSx::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Ref VolumeName
      VolumeType: ONTAP
      OntapConfiguration:
        SizeInMegabytes: !Ref VolumeSizeInMegabytes
        StorageVirtualMachineId: !Ref FsxSvm
        # SnapMirror Destination は DP タイプ
        # DP ボリュームでは JunctionPath, StorageEfficiency, SnapshotPolicy, SecurityStyle は指定不可
        # TieringPolicy は SnapMirror break 後に有効化される（DP 状態では Source のポリシーが優先）
        OntapVolumeType: DP
      Tags:
        - Key: Name
          Value: !Ref VolumeName

  # ---------------------------------------------------------------------------
  # Site-to-Site VPN (オプション)
  # ---------------------------------------------------------------------------
  VpnGateway:
    Type: AWS::EC2::VPNGateway
    Condition: CreateVpn
    Properties:
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: snapmirror-demo-vgw

  VpnGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateVpn
    Properties:
      VpcId: !Ref Vpc
      VpnGatewayId: !Ref VpnGateway

  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Condition: CreateVpn
    Properties:
      Type: ipsec.1
      BgpAsn: 65000
      IpAddress: !Ref OnPremPublicIp
      Tags:
        - Key: Name
          Value: snapmirror-demo-cgw

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    Condition: CreateVpn
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref CustomerGateway
      VpnGatewayId: !Ref VpnGateway
      StaticRoutesOnly: true
      Tags:
        - Key: Name
          Value: snapmirror-demo-vpn

  VpnConnectionRoute:
    Type: AWS::EC2::VPNConnectionRoute
    Condition: CreateVpn
    Properties:
      VpnConnectionId: !Ref VpnConnection
      DestinationCidrBlock: !Ref OnPremCidr

  VpnRoutePropagation:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    Condition: CreateVpn
    DependsOn: VpnGatewayAttachment
    Properties:
      RouteTableIds:
        - !Ref PrivateRouteTable
      VpnGatewayId: !Ref VpnGateway

# =============================================================================
# 出力
# =============================================================================
Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref Vpc

  FsxFileSystemId:
    Description: FSx for ONTAP File System ID
    Value: !Ref FsxFileSystem

  FsxManagementEndpoint:
    Description: FSx ONTAP 管理エンドポイント（REST API）
    Value: !GetAtt FsxFileSystem.DNSName

  SvmId:
    Description: Storage Virtual Machine ID
    Value: !Ref FsxSvm

  VolumeId:
    Description: SnapMirror Destination Volume ID
    Value: !Ref FsxVolume

  VpnConnectionId:
    Description: VPN Connection ID (VPN 有効時のみ)
    Condition: CreateVpn
    Value: !Ref VpnConnection

  NextSteps:
    Description: デプロイ後の手順
    Value: |
      1. SSM パラメータ /snapmirror-demo/fsx-admin-password を事前に作成
      2. VPN 接続を確立（または Direct Connect）
      3. オンプレ ONTAP で cluster peer / vserver peer を設定
      4. SnapMirror 関係を作成
      5. scripts/setup-s3-access-point.sh で S3 AP を構成
      6. Amazon Quick で S3 データソースを接続
